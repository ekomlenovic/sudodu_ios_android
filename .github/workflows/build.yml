name: Build iOS & Android (Unsigned)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_android:
        description: 'Build Android APK?'
        required: false
        type: boolean
        default: false

jobs:
  prepare:
    name: Prepare Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump-version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Bump version
        id: bump-version
        run: |
          npm version patch --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  build-ios:
    name: Build iOS
    needs: prepare
    runs-on: macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Apply Version
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            pkg.version = '${VERSION}';
            app.expo.version = '${VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
            fs.writeFileSync('app.json', JSON.stringify(app, null, 2));
          "

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Expo CLI + EAS CLI
        run: npm install -g expo-cli eas-cli

      - name: Generate native iOS project (expo prebuild)
        run: npx expo prebuild --platform ios --clean
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - name: Build iOS unsigned archive (xcodebuild)
        working-directory: ios
        run: |
          xcodebuild archive \
            -workspace RushHours.xcworkspace \
            -scheme RushHours \
            -configuration Release \
            -archivePath ../build/RushHours.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            -allowProvisioningUpdates \
            | xcpretty --color || true

      - name: Package unsigned IPA
        run: |
          mkdir -p build/ipa/Payload
          cp -r build/RushHours.xcarchive/Products/Applications/RushHours.app build/ipa/Payload/
          cd build/ipa
          zip -r ../../rush-hours-unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: rush-hours-unsigned.ipa

  build-android:
    name: Build Android
    needs: prepare
    if: github.event.inputs.build_android == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Apply Version
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            pkg.version = '${VERSION}';
            app.expo.version = '${VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
            fs.writeFileSync('app.json', JSON.stringify(app, null, 2));
          "

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Expo CLI + EAS CLI
        run: npm install -g expo-cli eas-cli

      - name: Generate native Android project (expo prebuild)
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: android/app/build/outputs/apk/release/app-release.apk

  release:
    name: Create Release
    needs: [prepare, build-ios] # Android is optional, so we don't 'need' it to start release logic
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download ISO Build
        uses: actions/download-artifact@v4
        with:
          name: ios-build

      - name: Download Android Build (Optional)
        uses: actions/download-artifact@v4
        with:
          name: android-build
        continue-on-error: true

      - name: Rename binaries
        run: |
          if [ -f "app-release.apk" ]; then
            mv app-release.apk rush-hours.apk
            echo "HAS_APK=true" >> $GITHUB_ENV
          else
            echo "HAS_APK=false" >> $GITHUB_ENV
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v${{ needs.prepare.outputs.version }}-b${{ github.run_number }}
          name: Rush Hours v${{ needs.prepare.outputs.version }} (Build ${{ github.run_number }})
          body: |
            ## Release v${{ needs.prepare.outputs.version }}
            
            Multi-platform build from `${{ github.sha }}`.

            ### iOS (IPA Non-Signé)
            À installer via SideStore / AltStore.
            
            ### Android (APK)
            Installation directe.
          files: |
            rush-hours-unsigned.ipa
            rush-hours.apk
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Update Sources & Push Changes
        run: |
          IPA_SIZE=$(stat -c%s rush-hours-unsigned.ipa)
          
          if [ "${{ env.HAS_APK }}" = "true" ]; then
            APK_SIZE=$(stat -c%s rush-hours.apk)
          else
            APK_SIZE=0
          fi

          VERSION="${{ needs.prepare.outputs.version }}"
          TAG_NAME="v${VERSION}-b${{ github.run_number }}"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG_NAME}"
          IPA_URL="${BASE_URL}/rush-hours-unsigned.ipa"
          APK_URL="${BASE_URL}/rush-hours.apk"
          DATE=$(date +'%Y-%m-%d')
          
          node -e "
            const fs = require('fs');
            
            // Update package.json & app.json for the repo
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
            
            const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            app.expo.version = '${VERSION}';
            fs.writeFileSync('app.json', JSON.stringify(app, null, 2));
            
            // Update sidestore-source.json (iOS)
            const iosSource = JSON.parse(fs.readFileSync('sidestore-source.json', 'utf8'));
            const iosApp = iosSource.apps[0];
            iosApp.version = '${VERSION}';
            iosApp.buildVersion = '${{ github.run_number }}';
            iosApp.versionDate = '${DATE}';
            iosApp.downloadURL = '${IPA_URL}';
            iosApp.size = parseInt('${IPA_SIZE}');
            fs.writeFileSync('sidestore-source.json', JSON.stringify(iosSource, null, 2));
            
            // Update android-source.json (Android)
            const androidSource = JSON.parse(fs.readFileSync('android-source.json', 'utf8'));
            const androidApp = androidSource.apps[0];
            androidApp.version = '${VERSION}';
            androidApp.buildVersion = '${{ github.run_number }}';
            androidApp.versionDate = '${DATE}';
            const newApkSize = parseInt('${APK_SIZE}');
            if (newApkSize > 0) {
              androidApp.size = newApkSize;
            }
            fs.writeFileSync('android-source.json', JSON.stringify(androidSource, null, 2));
          "
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json app.json sidestore-source.json android-source.json
          git commit -m "chore: bump version to ${VERSION} and update update sources [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
